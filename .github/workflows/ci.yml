name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sunday at 9am UTC
    - cron: '0 9 * * 0'

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Validate links
        run: node scripts/validate-links.js

  check-generated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: test -f README.md

      - name: Check stars.md exists
        run: test -f stars.md

      - name: Check topics.md exists
        run: test -f topics.md

      - name: Verify file sizes are reasonable
        run: |
          readme_size=$(wc -c < README.md)
          stars_size=$(wc -c < stars.md)
          if [ "$readme_size" -lt 1000 ]; then
            echo "README.md seems too small ($readme_size bytes)"
            exit 1
          fi
          if [ "$stars_size" -lt 1000 ]; then
            echo "stars.md seems too small ($stars_size bytes)"
            exit 1
          fi
          echo "README.md: $readme_size bytes"
          echo "stars.md: $stars_size bytes"
